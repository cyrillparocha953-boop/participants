<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, textarea:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        .alert {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sender Portal</h2>
        
        <div class="form-group">
            <label for="groupSelect">Pumili ng Grupo</label>
            <select id="groupSelect">
                <option value="Grupo A">Grupo A</option>
                <option value="Grupo B">Grupo B</option>
                <option value="Grupo C">Grupo C</option>
                <option value="Grupo D">Grupo D</option>
            </select>
        </div>

        <div class="form-group">
            <label for="messageInput">Mensahe o Impormasyon</label>
            <textarea id="messageInput" placeholder="I-type ang mensahe rito..."></textarea>
        </div>

        <button onclick="sendData()">Ipadala sa Admin</button>

        <div id="alertBox" class="alert alert-success">Matagumpay na naipadala!</div>
    </div>

   <script>
    function sendData() {
        const group = document.getElementById('groupSelect').value;
        const message = document.getElementById('messageInput').value;

        if (!message.trim()) {
            alert('Mangyaring maglagay ng mensahe.');
            return;
        }

        // Gumawa ng data object
        const payload = {
            group: group,
            message: message,
            timestamp: new Date().toLocaleTimeString(),
            id: Date.now() // Nagpapasok ng kakaibang ID para laging bago ang data
        };

        // Siguraduhing malinis at bago ang ipapadala
        localStorage.removeItem('admin_received_data');
        localStorage.setItem('admin_received_data', JSON.stringify(payload));

        // Success feedback sa screen
        const alertBox = document.getElementById('alertBox');
        alertBox.style.display = 'block';
        document.getElementById('messageInput').value = '';

        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 2000);
    }
</script>
