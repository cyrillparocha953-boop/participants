<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-weight: 600;
        }

        /* Ginawang regular input para sa pangalan/salita mas swak sa Word Cloud */
        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            opacity: 0.9;
        }

        .alert {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sino ang nais mong pasalamatan?</h2>
        
        <div class="form-group">
            <label for="messageInput">Pangalan o Maikling Salita</label>
            <input type="text" id="messageInput" placeholder="I-type ang pangalan dito..." autocomplete="off" maxlength="30">
        </div>

        <button onclick="sendData()">Ipadala sa Live Screen</button>

        <div id="alertBox" class="alert alert-success">Matagumpay na naipadala!</div>
    </div>

<script>
    // 🔴 PALITAN ITO NG MGA DETALYE MULA SA SUPABASE ACCOUNT MO (Pareho sa nilagay mo sa Admin)
    const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_PUBLIC_KEY";

    // I-initialize ang Supabase Client
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function sendData() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();

        // Validasyon para maiwasang walang laman ang maipasa
        if (!message) {
            alert('Mangyaring maglagay ng pangalan o mensahe.');
            return;
        }

        const currentTime = new Date().toLocaleTimeString();

        // Direktang i-save sa database table ng Supabase
        const { data, error } = await supabase
            .from('messages')
            .insert([
                { message: message, timestamp: currentTime }
            ]);

        if (error) {
            console.error('Error sa pagpapadala:', error);
            alert('Nagka-error sa pagpapadala. Subukan muli.');
            return;
        }

        // Success feedback kapag pumasok na sa cloud
        const alertBox = document.getElementById('alertBox');
        alertBox.style.display = 'block';
        messageInput.value = ''; // Linisin ang input box pagkatapos mag-send

        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 2000);
    }

    // Dagdag na feature: Pwedeng i-enter sa keyboard para mag-send agad
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendData();
        }
    });
</script>
</body>
</html>
